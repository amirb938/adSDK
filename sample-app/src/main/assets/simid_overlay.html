<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>SIMID Overlay</title>
    <style>
      :root {
        --bg: rgba(0, 0, 0, 0.55);
        --card: rgba(255, 255, 255, 0.95);
        --text: #0f172a;
        --muted: #475569;
        --accent: #f59e0b;
        --danger: #ef4444;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
      }
      body {
        background: transparent;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 16px;
        box-sizing: border-box;
      }
      .scrim {
        position: fixed;
        inset: 0;
        background: var(--bg);
      }
      .card {
        position: relative;
        width: min(520px, 100%);
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-sizing: border-box;
        box-shadow: 0 12px 42px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 6px 0;
        font-size: 18px;
        color: var(--text);
      }
      p {
        margin: 0 0 14px 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.35;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--text);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        font-size: 16px;
        padding: 12px 12px;
        border: 1px solid rgba(15, 23, 42, 0.15);
        border-radius: 12px;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border-color: rgba(245, 158, 11, 0.8);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.25);
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        font-size: 15px;
        padding: 12px 12px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
      }
      .primary {
        background: var(--accent);
        color: #111827;
        font-weight: 600;
      }
      .secondary {
        background: rgba(15, 23, 42, 0.08);
        color: var(--text);
      }
      .danger {
        background: rgba(239, 68, 68, 0.15);
        color: var(--danger);
        font-weight: 600;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.08);
      }
    </style>
    <script>
      function post(type) {
        try {
          if (window.AndroidSimidBridge && window.AndroidSimidBridge.postMessage) {
            window.AndroidSimidBridge.postMessage(JSON.stringify({ type: type }));
          }
        } catch (e) {
          // no-op
        }
      }
      function setStatus(text) {
        var el = document.getElementById("status");
        if (el) el.textContent = text;
      }
      window.addEventListener("load", function () {
        setStatus("Ready. Tap " + '"Pause Ad"' + " to request pause.");
      });
    </script>
  </head>
  <body>
    <div class="scrim" onclick="post('SIMID_requestPlay');"></div>
    <div class="card" role="dialog" aria-label="SIMID Mock Overlay">
      <h1>Interactive overlay (SIMID mock)</h1>
      <p>
        This is a local HTML asset rendered over the ad video. It calls
        <span class="kbd">AndroidSimidBridge.postMessage</span> to request play/pause.
      </p>

      <form
        onsubmit="event.preventDefault(); post('SIMID_requestPlay'); setStatus('Submitted. Requested play.'); return false;"
      >
        <label for="phone">Phone number</label>
        <input
          id="phone"
          name="phone"
          type="tel"
          inputmode="tel"
          autocomplete="tel"
          placeholder="+1 555 123 4567"
          aria-label="Phone number"
        />
        <div class="row">
          <button
            type="button"
            class="danger"
            onclick="post('SIMID_requestPause'); setStatus('Requested pause.');"
          >
            Pause Ad
          </button>
          <button type="submit" class="primary">Submit &amp; Play</button>
        </div>
        <div class="row">
          <button
            type="button"
            class="secondary"
            onclick="post('SIMID_requestPlay'); setStatus('Requested play.');"
          >
            Play Ad
          </button>
        </div>
        <div class="status" id="status"></div>
      </form>
    </div>
  </body>
</html>
